default_interval_seconds = 0.5

locations = [
    "采煤面",
    "掘进面",
    "回风巷",
    "运输巷",
    "皮带机",
    "转载点",
    "井底车场",
    "中央变电所",
    "水泵房"
]

[sensor_types.gas]
unit = "%CH4"
warning_threshold = 1.0
critical_threshold = 1.5

[sensor_types.temperature]
unit = "°C"
warning_threshold = 45.0
critical_threshold = 60.0


[sensors.temperature_sensor_01]
type = "temperature"
unit = "°C"
location = "采煤面"
interval_seconds = 0.5
client_cert = "certs/temperature_sensor_01.crt"
client_key = "certs/temperature_sensor_01.key"

[sensors.gas_sensor_01]
type = "gas"
unit = "%CH4"
location = "采煤面"
interval_seconds = 0.5
client_cert = "certs/gas_sensor_01.crt"
client_key = "certs/gas_sensor_01.key"

[sensors.temperature_sensor_02]
type = "temperature"
unit = "°C"
location = "掘进面"
interval_seconds = 0.5
client_cert = "certs/temperature_sensor_02.crt"
client_key = "certs/temperature_sensor_02.key"

[sensors.gas_sensor_02]
type = "gas"
unit = "%CH4"
location = "掘进面"
interval_seconds = 0.5
client_cert = "certs/gas_sensor_02.crt"
client_key = "certs/gas_sensor_02.key"


[mqtt]
host = "localhost"
port = 8883
ca_file = "certs/ca.crt"
center_cert = "certs/center.crt"
center_key = "certs/center.key"
